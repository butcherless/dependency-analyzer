name: Setup JDK
description: Set up the JDK shared by the CI and mutation-testing workflows
# Assumes the caller has already run actions/checkout - local composite actions are resolved
# against the checked-out workspace, so checkout can't live inside this action.

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: sbt
