stryker4s {
  # Relative to the application subproject's base-dir, not the repo root. Excludes poc/** -
  # unrelated PoC/demo code (Kafka producer/consumer demos, banking domain PoC, ZIO layer/loop
  # demos) with no test coverage by design, which would otherwise dilute the mutation score.
  mutate = ["src/main/scala/**/*.scala", "!src/main/scala/com/cmartin/utils/poc/**"]

  reporters = ["console", "html"]

  # Default (5s) times out on the initial baseline run before per-test timings exist -
  # cold JVM start plus the full suite easily exceeds it.
  timeout = 60 seconds

  # legacy-test-runner is left unset (defaults to false) - neither value currently produces a
  # working baseline run on this project (see CLAUDE.md's "Mutation testing (Stryker4s)" section
  # for the full diagnosis). `true` was ported from a sibling project for a mixed ScalaTest + ZIO
  # Test issue that doesn't apply here (this module is ScalaTest-only) and fails here for a
  # different, unresolved reason. `false` gets further (compiles, spins up test-runners) but still
  # fails at the initial run with no diagnosable cause. Revisit once that's root-caused.

  thresholds {
    high  = 80
    low   = 60
    break = 0   # report-only until a baseline mutation score exists
  }
}
